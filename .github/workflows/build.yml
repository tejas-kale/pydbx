name: Build

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run compile

      - run: npm test

      - run: npx vsce package

      - uses: actions/upload-artifact@v4
        with:
          name: pydbx-vsix
          path: '*.vsix'
          retention-days: 30
